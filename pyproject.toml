[tool.ruff]
target-version = "py310"
line-length = 120
exclude = [
    "venv",
    ".venv",
    "__pycache__",
    "alembic/versions",
]

[tool.ruff.lint]
# Pyflakes (F) + pycodestyle errors/warnings (E/W) + import sorting (I).
# Intentionally not adding stricter rule sets (e.g. B, UP, SIM) yet -- this
# is a baseline for new/touched code, not a mandate to rewrite the existing
# ~127 files in one pass.
select = ["E", "F", "W", "I"]
ignore = [
    "E402", # module-level imports after code: used deliberately in a few
            # places (e.g. workers/celery_app.py) for registration ordering.
]

[tool.ruff.lint.per-file-ignores]
"alembic/versions/*.py" = ["E501"] # autogenerated/hand-written migration bodies

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
