name: SmartSafe Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile source files
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $files = Get-ChildItem -Recurse -File -Filter *.py | Where-Object { $_.FullName -notmatch '\\venv\\|\\\.venv\\|\\__pycache__\\' }
          foreach ($f in $files) {
            python -m py_compile $f.FullName
          }

      - name: Run tests
        run: |
          python -m unittest tests.test_bulk_message_tab tests.test_incremental_polling_integration -v
